services:
  postgres:
    image: postgres:16-alpine
    container_name: captyn-housing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: captyn
      POSTGRES_PASSWORD: captyn
      POSTGRES_DB: captyn_housing
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U captyn -d captyn_housing"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - captyn_housing_postgres_data:/var/lib/postgresql/data

volumes:
  captyn_housing_postgres_data:
